# Multi-module mode with a crossProject module. Both components (coreJVM/coreNative)
# strip their platform suffix to `core` and bind to modules.core, then filter deps per platform.
scalaVersion = "3.3.4"

modules {
  core {
    dependencies {
      shared {
        scala = ["org.typelevel:cats-core:2.13.0"]
      }
      jvm {
        java = ["com.google.code.gson:gson:2.11.0"]
      }
      native = ["com.armanbilge:epollcat:0.1.6"]
    }
  }
}
