# Multi-module mode: top-level settings are shared across listed modules.
scalaVersion = "3.3.4"
dependencies = ["org.typelevel:cats-core:2.13.0"]

modules {
  # Only shared settings — listed empty so it opts in.
  core {}

  # Shared + its own dependency (merge: shared ++ module).
  skunk {
    dependencies = ["io.circe:circe-core:0.14.10"]
  }

  # Plain JVM project whose id ends in a capitalized platform token.
  # Exact-first binding must match `modules.analyticsJS` directly (NOT strip to `analytics`).
  analyticsJS {
    dependencies = ["org.typelevel:cats-effect:3.5.4"]
  }
}
